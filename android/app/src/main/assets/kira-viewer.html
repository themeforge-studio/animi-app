<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; }
    body { background: transparent; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #loading { 
      position: fixed; top: 50%; left: 50%; 
      transform: translate(-50%, -50%);
      color: white; font-size: 16px; font-family: Arial;
    }
  </style>
</head>
<body>
  <div id="loading">Cargando a Kira...</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 3);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 1);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 2);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(1, 2, 1);
    scene.add(dirLight);

    let mixer;
    const clock = new THREE.Clock();
    const KIRA_URL = 'https://ubnjxkqgdbdrqgbihwuf.supabase.co/storage/v1/object/public/themeforge-images/character/vrm/Kira.fbx';

    const loader = new THREE.FBXLoader();
    loader.load(KIRA_URL, 
      (fbx) => {
        document.getElementById('loading').style.display = 'none';
        fbx.scale.setScalar(0.01);
        scene.add(fbx);
        if (fbx.animations.length > 0) {
          mixer = new THREE.AnimationMixer(fbx);
          mixer.clipAction(fbx.animations[0]).play();
        }
      },
      (xhr) => {
        const pct = Math.round(xhr.loaded / xhr.total * 100);
        document.getElementById('loading').textContent = `Cargando Kira... ${pct}%`;
      },
      (err) => {
        document.getElementById('loading').textContent = 'Error cargando Kira';
        console.error(err);
      }
    );

    function animate() {
      requestAnimationFrame(animate);
      if (mixer) mixer.update(clock.getDelta());
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
